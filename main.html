<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accessible Web Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1 role="heading" aria-level="1">My Accessible Page</h1>

    <nav role="navigation">
        <ul role="list">
            <li role="listitem"><a href="#">Home</a></li>
            <li role="listitem"><a href="#">About</a></li>
            <li role="listitem"><a href="#">Contact</a></li>
        </ul>
    </nav>

    <img role="img" src="https://via.placeholder.com/300" alt="Sample Image">

    <p>This is a brief description of the webpage demonstrating ARIA roles usage.</p>

    <ul role="list">
        <li role="listitem">Item One</li>
        <li role="listitem">Item Two</li>
        <li role="listitem">Item Three</li>
    </ul>

</body>
</html>
